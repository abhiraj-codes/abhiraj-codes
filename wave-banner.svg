<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 170" width="900" height="170">
  <defs>
    <style>
      @keyframes waveRight { from { transform: translateX(0px); } to { transform: translateX(900px); } }
      @keyframes waveRight2 { from { transform: translateX(0px); } to { transform: translateX(900px); } }
      @keyframes c0 { 0%,100% { stop-color: #00f2c3; } 33% { stop-color: #0070f3; } 66% { stop-color: #0d1b6e; } }
      @keyframes c1 { 0%,100% { stop-color: #0070f3; } 33% { stop-color: #0d1b6e; } 66% { stop-color: #00f2c3; } }
      @keyframes c2 { 0%,100% { stop-color: #0d1b6e; } 33% { stop-color: #00f2c3; } 66% { stop-color: #0070f3; } }
      @keyframes revealText { from { width: 0px; } to { width: 880px; } }
      .wg1 { animation: waveRight 5s linear infinite; }
      .wg2 { animation: waveRight2 8s linear infinite; }
      .s0 { animation: c0 9s ease-in-out infinite; }
      .s1 { animation: c1 9s ease-in-out infinite; }
      .s2 { animation: c2 9s ease-in-out infinite; }
      .rc { animation: revealText 5s 0.4s ease-out forwards; }
    </style>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0">
      <stop class="s0" offset="0%"/>
      <stop class="s1" offset="50%"/>
      <stop class="s2" offset="100%"/>
    </linearGradient>
    <filter id="tf" x="-5%" y="-70%" width="110%" height="240%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="b"/>
      <feFlood flood-color="#00f2c3" flood-opacity="0.45" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="cp">
      <rect class="rc" x="10" y="0" width="0" height="170"/>
    </clipPath>
  </defs>
  <rect width="900" height="170" fill="#060d1f"/>
  <g class="wg1">
    <path fill="url(#wg)" opacity="0.92" d="M-900,88 C-825,52 -750,124 -675,88 C-600,52 -525,124 -450,88 C-375,52 -300,124 -225,88 C-150,52 -75,124 0,88 L0,170 L-900,170 Z"/>
    <path fill="url(#wg)" opacity="0.92" d="M0,88 C75,52 150,124 225,88 C300,52 375,124 450,88 C525,52 600,124 675,88 C750,52 825,124 900,88 L900,170 L0,170 Z"/>
  </g>
  <g class="wg2" style="opacity: 0.27;">
    <path fill="#22d3ee" d="M-900,112 C-788,82 -675,142 -563,112 C-450,82 -338,142 -225,112 C-113,82 0,142 0,112 L0,170 L-900,170 Z"/>
    <path fill="#22d3ee" d="M0,112 C112,82 225,142 337,112 C450,82 562,142 675,112 C787,82 900,142 900,112 L900,170 L0,170 Z"/>
  </g>
  <text x="450" y="98" text-anchor="middle" dominant-baseline="middle" font-family="'Courier New', Courier, monospace" font-size="13.5" font-weight="bold" fill="#ffffff" filter="url(#tf)" clip-path="url(#cp)">My LLMs don't hallucinate, they improve the product roadmaps with high confidence.</text>
</svg>
